<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tool — HireKraft</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.7.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,-apple-system,"Segoe UI",sans-serif;font-size:14px;color:#1a1b1d;background:#faf9f7}
.app{display:grid;grid-template-columns:210px 1fr;height:100vh}
.rail{background:#fff;border-right:1px solid #e9e6e0;padding:14px;display:flex;flex-direction:column}
.brand{font-weight:600;font-size:13px}.brand small{display:block;color:#b9bcc2;font-size:9px;font-family:monospace}
.mode{margin:12px 0;padding:7px 10px;background:#eef2f8;border:1px solid #dce6f3;border-radius:7px;font-family:monospace;font-size:10px;color:#2c5a92}
.rl{font-family:monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#b9bcc2;margin:8px 0 4px}
.mb{padding:7px 6px;font-size:12.5px;color:#56585e;display:flex;justify-content:space-between;border-radius:6px}
.mb.on{background:#eef2f8;color:#1a1b1d;font-weight:500}.mb.off{color:#b9bcc2}.mb .c{font-family:monospace;font-size:10px;color:#b9bcc2}
.me{margin-top:auto;border-top:1px solid #f1efe9;padding-top:10px;display:flex;align-items:center;gap:8px}
.me .av{width:24px;height:24px;border-radius:50%;background:#eef2f8;color:#2c5a92;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}
.me .mn{font-size:12px;color:#56585e}.me .mr{font-family:monospace;font-size:9px;color:#b9bcc2}
.main{display:flex;flex-direction:column;min-width:0}
.tb{display:flex;align-items:center;gap:12px;padding:13px 22px;border-bottom:1px solid #e9e6e0;background:#fff}
.tb h1{font-size:15px;font-weight:600}.tb .ad{font-family:monospace;font-size:11px;color:#8a8d93}
.live{margin-left:auto;font-family:monospace;font-size:10px;color:#8a8d93;display:flex;align-items:center;gap:6px}.live .d{width:7px;height:7px;border-radius:50%;background:#3f9a5a}
.tabs{display:flex;padding:0 22px;border-bottom:1px solid #e9e6e0;background:#fff}
.tab{padding:12px 16px;cursor:pointer;border-bottom:2px solid transparent;color:#8a8d93;display:flex;gap:8px;align-items:center}
.tab.on{color:#1a1b1d;border-bottom-color:#1a1b1d}.tab .ti{font-size:16px}.tab .tl{font-size:13px;font-weight:500}
.tab .n{font-family:monospace;font-size:10px;background:#f1efe9;padding:1px 7px;border-radius:10px;color:#8a8d93}
.ctx{padding:9px 22px;font-size:11.5px;border-bottom:1px solid #f1efe9}
.ctx.business{background:#eaf1f9;color:#2c5a92}.ctx.noise{background:#f7f0dd;color:#8a6d1f}.ctx.personal{background:#efeafa;color:#6b4ea8}
.chips{display:flex;gap:7px;padding:10px 22px;flex-wrap:wrap}
.chip{font-size:11px;padding:4px 11px;border-radius:20px;border:1px solid #e9e6e0;background:#fff;color:#56585e;cursor:pointer;display:flex;gap:6px;align-items:center}
.chip.on{background:#1a1b1d;color:#fff;border-color:#1a1b1d}.chip .c{font-family:monospace;font-size:9.5px;opacity:.7}
.list{flex:1;overflow-y:auto}
.m{display:grid;grid-template-columns:34px 1fr auto;gap:13px;padding:12px 22px;border-bottom:1px solid #f1efe9;cursor:pointer}
.m:hover{background:#fff}
.av2{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:#eef1f4;color:#5f6e7e}
.fr{font-size:13px;color:#56585e;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tag{font-family:monospace;font-size:8.5px;text-transform:uppercase;padding:2px 7px;border-radius:4px;font-weight:600;margin-left:8px}
.su{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wy{font-size:11.5px;color:#8a8d93;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tm{font-family:monospace;font-size:10.5px;color:#b9bcc2;white-space:nowrap}
.st{padding:40px 22px;text-align:center;color:#8a8d93}
.ft{padding:13px 22px;font-family:monospace;font-size:10px;color:#b9bcc2;border-top:1px solid #f1efe9}
.tier-general{background:#eef1f4;color:#5f6e7e}.tier-finance{background:#e7f1ec;color:#2f7d57}.tier-comp{background:#f6ecd9;color:#9a6212}.tier-legal{background:#efeafa;color:#6b4ea8}.tier-hr{background:#f7e7e6;color:#a8423f}.tier-restricted{background:#f7e3e1;color:#a3322d}
</style>
</head>
<body>
<div class="app">
<aside class="rail">
<div class="brand">Tool<small>hirekraft</small></div>
<div class="mode">mode &middot; CEO</div>
<div class="rl">Mailboxes</div><div id="mb"></div>
<div class="me"><span class="av">AN</span><div><div class="mn">Alex N.</div><div class="mr">all access</div></div></div>
</aside>
<main class="main">
<div class="tb"><h1>Inbox</h1><span class="ad">alex@hirekraft.ai</span><div class="live"><span class="d"></span>live from brain</div></div>
<div class="tabs" id="tabs"></div>
<div class="ctx" id="ctx"></div>
<div class="chips" id="chips"></div>
<div class="list" id="list"><div class="st">Loading...</div></div>
<div class="ft" id="ft"></div>
</main>
</div>
<script>
var API="https://uvdoompnnypmneyrvtas.supabase.co/functions/v1/tool-inbox";
var SRC="gmail:alex@hirekraft.ai";
var CATS={business:{l:"Business",i:"ti-briefcase",c:"In the brain. The intelligence reasons over these. Your personal life never enters here."},noise:{l:"Noise",i:"ti-news",c:"Newsletters, promotions, notifications kept out of the brain, nothing deleted."},personal:{l:"Personal",i:"ti-user",c:"Judged personal kept out of the company brain, private to you."}};
var TK=["general","finance","comp","legal","hr","restricted"];
var MB=[["alex@",1],["accounting@",0],["admin@",0],["marketing@",0],["recruitment@",0]];
var counts=null,cat="business",tier=null;
function api(action,extra){return fetch(API+"?t="+Date.now(),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(Object.assign({action:action,source_key:SRC},extra||{}))}).then(function(r){return r.json();});}
function rail(){document.getElementById("mb").innerHTML=MB.map(function(m){var v=m[1]&&counts?(counts.business+counts.noise+counts.personal).toLocaleString():(m[1]?"...":"off");return "<div class=\"mb "+(m[1]?"on":"off")+"\"><span>"+m[0]+"</span><span class=c>"+v+"</span></div>";}).join("");}
function tabs(){document.getElementById("tabs").innerHTML=Object.keys(CATS).map(function(k){var c=CATS[k];var n=counts?counts[k].toLocaleString():"...";return "<div class=\"tab "+(cat===k?"on":"")+"\" onclick=\"setCat('"+k+"')\"><i class=\"ti "+c.i+"\"></i><span class=tl>"+c.l+"</span><span class=n>"+n+"</span></div>";}).join("");}
function ctx(){var c=CATS[cat];var e=document.getElementById("ctx");e.className="ctx "+cat;e.textContent=c.c;}
function chips(){var b=document.getElementById("chips");if(cat!=="business"||!counts){b.style.display="none";return;}b.style.display="flex";var h="<div class=\"chip "+(tier===null?"on":"")+"\" onclick=\"setTier(null)\">All <span class=c>"+counts.business.toLocaleString()+"</span></div>";h+=TK.map(function(t){return "<div class=\"chip "+(tier===t?"on":"")+"\" onclick=\"setTier('"+t+"')\"><span class=\"tag tier-"+t+"\" style=\"margin:0;padding:1px 6px\">"+t+"</span><span class=c>"+((counts.tiers[t]||0).toLocaleString())+"</span></div>";}).join("");b.innerHTML=h;}
function ini(s){var p=(s||"?").replace(/[<>"].*/,"").trim().split(/\s+/);return ((p[0]||"?")[0]+(p[1]?p[1][0]:"")).toUpperCase();}
function fmt(d){if(!d)return"-";return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric"});}
function esc(s){return (s||"").replace(/</g,"&lt;");}
function load(){var L=document.getElementById("list");L.innerHTML="<div class=st>Loading "+cat+"...</div>";api("messages",{bucket:cat,tier:tier,limit:50}).then(function(res){if(!res.ok){L.innerHTML="<div class=st>Error: "+res.error+"</div>";return;}var rows=res.messages||[];document.getElementById("ft").textContent=cat+(tier?"/"+tier:"")+": "+rows.length+" shown - live from brain, nothing hand-entered";if(!rows.length){L.innerHTML="<div class=st>No messages.</div>";return;}L.innerHTML=rows.map(function(m){var tag=(cat==="business"&&m.tier)?"<span class=\"tag tier-"+m.tier+"\">"+m.tier+"</span>":"";var s=(m.subject||"").replace(/'/g,"");return "<div class=m onclick=\"sendPrompt('Open this "+cat+" message, say why it was classified "+cat+(m.tier?(" / "+m.tier):"")+", and if business draft a reply: "+s.replace(/\"/g,"")+"')\"><span class=av2>"+ini(m.from_name)+"</span><div style=min-width:0><div><span class=fr>"+esc(m.from_name||m.from_email||"?")+"</span>"+tag+"</div><div class=su>"+esc(m.subject)+"</div><div class=wy>"+esc((m.reason||"").slice(0,110))+"</div></div><div class=tm>"+fmt(m.date)+"</div></div>";}).join("");}).catch(function(e){L.innerHTML="<div class=st>Could not reach brain: "+e+"</div>";});}
function setCat(k){cat=k;tier=null;tabs();ctx();chips();load();}
function setTier(t){tier=t;chips();load();}
window.sendPrompt=window.sendPrompt||function(t){alert(t);};
rail();tabs();ctx();api("counts").then(function(c){if(c.ok){counts=c.counts;}rail();tabs();chips();load();}).catch(function(){load();});
</script>
</body>
</html>
